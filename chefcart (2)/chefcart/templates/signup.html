{% extends "base.html" %}
{% block title %}Sign Up – ChefCart{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">🍳</div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join ChefCart and book amazing chefs</p>

    <form method="POST" action="{{ url_for('signup') }}" class="auth-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Log In</a>
    </p>
  </div>
</div>
{% endblock %}
